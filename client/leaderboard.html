<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HelpHub AI - Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal: #1a7a6e; --teal-dark: #15635a;
    --cream: #f0ede6; --cream2: #e8e4dc;
    --white: #fff; --dark: #1e3530;
    --text-dark: #1a2e2a; --text-muted: #6b7b74;
    --border: rgba(0,0,0,0.09);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-dark); min-height: 100vh; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse at 0% 100%, rgba(100,180,160,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 100% 0%,  rgba(240,210,150,0.20) 0%, transparent 45%);
  }

  /* NAV */
  nav { position:relative; z-index:10; display:flex; align-items:center; padding:14px 40px; background:var(--cream); border-bottom:1px solid var(--border); }
  .nav-logo { display:flex; align-items:center; gap:10px; font-weight:600; font-size:15px; color:var(--text-dark); text-decoration:none; }
  .logo-icon { width:34px; height:34px; background:var(--teal); border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:15px; }
  .nav-links { margin-left:auto; display:flex; gap:4px; }
  .nav-links a { text-decoration:none; color:var(--text-muted); font-size:14px; padding:7px 18px; border-radius:20px; cursor:pointer; transition:all .2s; }
  .nav-links a:hover { color:var(--text-dark); background:var(--cream2); }
  .nav-links a.active { background:var(--cream2); color:var(--text-dark); font-weight:500; }

  /* HERO */
  .hero { background:var(--dark); border-radius:18px; margin:28px 40px 0; padding:44px 52px; position:relative; z-index:1; }
  .hero-label { font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,0.5); margin-bottom:14px; }
  .hero-title { font-size:44px; font-weight:800; color:#fff; margin-bottom:12px; letter-spacing:-.5px; line-height:1.1; }
  .hero-desc  { font-size:14px; color:rgba(255,255,255,0.6); }

  /* MAIN */
  .main-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin:24px 40px 60px; position:relative; z-index:1; }

  /* CARDS */
  .card { background:var(--white); border-radius:18px; padding:32px; border:.5px solid var(--border); }
  .card-label { font-size:10.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--teal); margin-bottom:12px; }
  .card-title { font-size:28px; font-weight:700; color:var(--text-dark); margin-bottom:24px; }

  /* RANKINGS */
  .rank-list { display:flex; flex-direction:column; gap:12px; }
  .rank-item {
    background:#faf9f7; border-radius:14px; padding:18px 20px;
    display:flex; align-items:center; gap:16px;
    border:.5px solid var(--border); transition:all .2s;
    animation: fadeIn 0.3s ease both;
  }
  .rank-item:hover { border-color:var(--teal); background:#f0faf8; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .rank-item:nth-child(2){animation-delay:.06s}
  .rank-item:nth-child(3){animation-delay:.12s}
  .rank-item:nth-child(4){animation-delay:.18s}
  .rank-item:nth-child(5){animation-delay:.24s}

  /* Avatar */
  .avatar {
    width:46px; height:46px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; font-weight:700; color:#fff;
  }

  .rank-info { flex:1; min-width:0; }
  .rank-name { font-size:15px; font-weight:700; color:var(--text-dark); margin-bottom:3px; }
  .rank-skills { font-size:12.5px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px; }

  .rank-stats { text-align:right; flex-shrink:0; }
  .rank-trust { font-size:16px; font-weight:700; color:var(--text-dark); }
  .rank-contribs { font-size:12px; color:var(--text-muted); margin-top:2px; }

  /* #1 highlight */
  .rank-item.first { border-color:rgba(26,122,110,0.3); background:#f0faf8; }
  .rank-item.first .rank-name { color:var(--teal); }

  /* Rank number badge */
  .rank-num {
    font-size:12px; font-weight:700; color:var(--text-muted);
    min-width:28px; text-align:center;
  }
  .rank-item.first .rank-num { color:var(--teal); font-size:13px; }

  /* BADGE SYSTEM */
  .badge-list { display:flex; flex-direction:column; gap:14px; }
  .badge-item {
    background:#faf9f7; border-radius:14px; padding:20px 22px;
    border:.5px solid var(--border);
    animation: fadeIn 0.3s ease both;
  }
  .badge-item:nth-child(2){animation-delay:.08s}
  .badge-item:nth-child(3){animation-delay:.16s}

  .badge-name { font-size:16px; font-weight:700; color:var(--text-dark); margin-bottom:5px; }
  .badge-tags { font-size:13px; color:var(--text-muted); margin-bottom:14px; }

  /* Trust bar */
  .trust-bar-wrap { height:8px; background:var(--cream2); border-radius:4px; overflow:hidden; }
  .trust-bar {
    height:100%; border-radius:4px;
    background: linear-gradient(90deg, #e8a020 0%, #1a7a6e 100%);
    transition: width 1s cubic-bezier(.4,0,.2,1);
  }

  /* Skeleton */
  .skel { background:var(--cream2); border-radius:8px; animation:shimmer 1.2s ease-in-out infinite; }
  @keyframes shimmer{0%,100%{opacity:1}50%{opacity:.45}}
  .skel-item { background:#faf9f7; border-radius:14px; padding:18px 20px; border:.5px solid var(--border); display:flex; gap:14px; align-items:center; }

  /* Empty */
  .empty { text-align:center; padding:40px 20px; color:var(--text-muted); font-size:14px; }

  @media(max-width:860px) {
    .main-grid { grid-template-columns:1fr; margin:16px; }
    .hero { margin:16px; padding:28px 22px; }
    .hero-title { font-size:30px; }
  }
</style>
</head>
<body>

<nav>
  <a href="/dashboard" class="nav-logo">
    <div class="logo-icon">H</div>
    HelpHub AI
  </a>
  <div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/explore">Explore</a>
    <a href="/leaderboard" class="active">Leaderboard</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-label">Leaderboard</div>
  <div class="hero-title">Recognize the people who keep<br>the community moving.</div>
  <div class="hero-desc">Trust score, contribution count, and badges create visible momentum for reliable helpers.</div>
</div>

<div class="main-grid">

  <!-- LEFT: Rankings -->
  <div class="card">
    <div class="card-label">Top Helpers</div>
    <div class="card-title">Rankings</div>
    <div class="rank-list" id="rankList">
      <!-- Skeletons -->
      <div class="skel-item">
        <div class="skel" style="width:46px;height:46px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">
          <div class="skel" style="width:55%;height:15px"></div>
          <div class="skel" style="width:70%;height:12px"></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <div class="skel" style="width:48px;height:16px"></div>
          <div class="skel" style="width:80px;height:12px"></div>
        </div>
      </div>
      <div class="skel-item">
        <div class="skel" style="width:46px;height:46px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">
          <div class="skel" style="width:45%;height:15px"></div>
          <div class="skel" style="width:60%;height:12px"></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <div class="skel" style="width:42px;height:16px"></div>
          <div class="skel" style="width:75px;height:12px"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Badge System -->
  <div class="card">
    <div class="card-label">Badge System</div>
    <div class="card-title">Trust and achievement</div>
    <div class="badge-list" id="badgeList">
      <div class="skel-item" style="flex-direction:column;align-items:flex-start;gap:10px">
        <div class="skel" style="width:40%;height:16px"></div>
        <div class="skel" style="width:70%;height:12px"></div>
        <div class="skel" style="width:100%;height:8px;border-radius:4px"></div>
      </div>
      <div class="skel-item" style="flex-direction:column;align-items:flex-start;gap:10px">
        <div class="skel" style="width:35%;height:16px"></div>
        <div class="skel" style="width:60%;height:12px"></div>
        <div class="skel" style="width:100%;height:8px;border-radius:4px"></div>
      </div>
    </div>
  </div>

</div>

<script>
  // ── Auth ─────────────────────────────────────────────────────
  const user = JSON.parse(localStorage.getItem("helphub_user") || "null");
  if (!user) window.location.href = "/auth";

  // ── Avatar helpers ───────────────────────────────────────────
  const COLORS = ["#1a7a6e","#e8a020","#c0392b","#6b2fb0","#1a6b8a","#2db88a","#d4793a"];
  function avatarColor(name) {
    let h = 0; for(let c of (name||"?")) h += c.charCodeAt(0);
    return COLORS[h % COLORS.length];
  }
  function initials(name) {
    return (name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  }
  function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  // ── Badge assign based on trust score ───────────────────────
  function getBadges(trustScore, contributions) {
    const badges = [];
    if (trustScore >= 90) badges.push("Top Mentor");
    if (trustScore >= 80) badges.push("Design Ally");
    if (contributions >= 20) badges.push("Fast Responder");
    if (contributions >= 10) badges.push("Community Voice");
    if (contributions >= 5)  badges.push("Bug Hunter");
    if (badges.length === 0)  badges.push("Rising Helper");
    return badges.slice(0, 3);
  }

  // ── Render rankings ──────────────────────────────────────────
  function renderRankings(users) {
    const list = document.getElementById("rankList");

    if (!users.length) {
      list.innerHTML = `<div class="empty">Abhi koi user nahi.</div>`;
      return;
    }

    list.innerHTML = users.map((u, i) => {
      const color  = avatarColor(u.name);
      const skills = Array.isArray(u.skills) && u.skills.length
        ? u.skills.join(", ")
        : (u.profile?.skills || "No skills added");
      const trust  = u.trustScore || 92;
      const contribs = u.contributions || 0;
      const isFirst = i === 0;

      return `
        <div class="rank-item ${isFirst ? "first" : ""}">
          <div class="rank-num">#${i+1}</div>
          <div class="avatar" style="background:${color}">${initials(u.name)}</div>
          <div class="rank-info">
            <div class="rank-name">${esc(u.name)}</div>
            <div class="rank-skills">${esc(skills)}</div>
          </div>
          <div class="rank-stats">
            <div class="rank-trust">${trust}%</div>
            <div class="rank-contribs">${contribs} contributions</div>
          </div>
        </div>`;
    }).join("");
  }

  // ── Render badge system ──────────────────────────────────────
  function renderBadges(users) {
    const list = document.getElementById("badgeList");

    if (!users.length) {
      list.innerHTML = `<div class="empty">Koi data nahi.</div>`;
      return;
    }

    list.innerHTML = users.slice(0, 5).map(u => {
      const trust   = u.trustScore || 92;
      const contribs = u.contributions || 0;
      const badges  = getBadges(trust, contribs);

      return `
        <div class="badge-item">
          <div class="badge-name">${esc(u.name)}</div>
          <div class="badge-tags">${badges.map(b => esc(b)).join(" • ")}</div>
          <div class="trust-bar-wrap">
            <div class="trust-bar" style="width:0%" data-width="${trust}%"></div>
          </div>
        </div>`;
    }).join("");

    // Animate bars after render
    requestAnimationFrame(() => {
      document.querySelectorAll(".trust-bar").forEach(bar => {
        bar.style.width = bar.dataset.width;
      });
    });
  }

  // ── Fetch users + requests for real contributions ─────────────
  async function fetchLeaderboard() {
    try {
      // Users fetch
      const usersRes = await fetch(`/api/messages/users?excludeId=none`);
      const allUsers = await usersRes.json();

      // Requests fetch — contributions count karne ke liye
      const reqRes  = await fetch("/api/requests");
      const requests = await reqRes.json();

      // Include current user bhi
      const meRes  = await fetch(`/api/messages/users?excludeId=__none__`);

      // Contributions: har user kitni requests pe help offer ki
      // (helpersInterested se estimate — real data ke liye extend kar sakte ho)
      // For now: requests posted by user = contribution
      const contribMap = {};
      requests.forEach(r => {
        const name = r.author?.name;
        if (name) contribMap[name] = (contribMap[name] || 0) + 1;
      });

      // Build leaderboard data
      let leaders = allUsers.map(u => ({
        ...u,
        trustScore:    u.trustScore    || Math.floor(60 + Math.random() * 38),
        contributions: contribMap[u.name] || u.contributions || 0,
        skills:        Array.isArray(u.skills) ? u.skills : [],
      }));

      // Add current logged-in user if not in list
      const inList = leaders.find(u => String(u._id) === String(user.id));
      if (!inList) {
        leaders.push({
          _id:  user.id,
          name: user.name,
          trustScore:    92,
          contributions: contribMap[user.name] || 0,
          skills:        [],
        });
      }

      // Sort by trust score desc, then contributions
      leaders.sort((a,b) => {
        if (b.trustScore !== a.trustScore) return b.trustScore - a.trustScore;
        return b.contributions - a.contributions;
      });

      renderRankings(leaders);
      renderBadges(leaders);

    } catch(err) {
      console.error("Leaderboard fetch error:", err);
      // Fallback: show current user
      const fallback = [{ _id: user.id, name: user.name, trustScore: 92, contributions: 0, skills: [] }];
      renderRankings(fallback);
      renderBadges(fallback);
    }
  }

  fetchLeaderboard();
  // Refresh every 30s
  setInterval(fetchLeaderboard, 30000);
</script>
</body>
</html>
