<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HelpHub AI - Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/leader.css">
</head>
<body>

<nav>
  <a href="/dashboard" class="nav-logo">
    <div class="logo-icon">H</div>
    HelpHub AI
  </a>
  <div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/explore">Explore</a>
    <a href="/leaderboard" class="active">Leaderboard</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-label">Leaderboard</div>
  <div class="hero-title">Recognize the people who keep<br>the community moving.</div>
  <div class="hero-desc">Trust score, contribution count, and badges create visible momentum for reliable helpers.</div>
</div>

<div class="main-grid">

  <!-- LEFT: Rankings -->
  <div class="card">
    <div class="card-label">Top Helpers</div>
    <div class="card-title">Rankings</div>
    <div class="rank-list" id="rankList">
      <!-- Skeletons -->
      <div class="skel-item">
        <div class="skel" style="width:46px;height:46px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">
          <div class="skel" style="width:55%;height:15px"></div>
          <div class="skel" style="width:70%;height:12px"></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <div class="skel" style="width:48px;height:16px"></div>
          <div class="skel" style="width:80px;height:12px"></div>
        </div>
      </div>
      <div class="skel-item">
        <div class="skel" style="width:46px;height:46px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">
          <div class="skel" style="width:45%;height:15px"></div>
          <div class="skel" style="width:60%;height:12px"></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <div class="skel" style="width:42px;height:16px"></div>
          <div class="skel" style="width:75px;height:12px"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Badge System -->
  <div class="card">
    <div class="card-label">Badge System</div>
    <div class="card-title">Trust and achievement</div>
    <div class="badge-list" id="badgeList">
      <div class="skel-item" style="flex-direction:column;align-items:flex-start;gap:10px">
        <div class="skel" style="width:40%;height:16px"></div>
        <div class="skel" style="width:70%;height:12px"></div>
        <div class="skel" style="width:100%;height:8px;border-radius:4px"></div>
      </div>
      <div class="skel-item" style="flex-direction:column;align-items:flex-start;gap:10px">
        <div class="skel" style="width:35%;height:16px"></div>
        <div class="skel" style="width:60%;height:12px"></div>
        <div class="skel" style="width:100%;height:8px;border-radius:4px"></div>
      </div>
    </div>
  </div>

</div>

<script>
  // ── Auth ─────────────────────────────────────────────────────
  const user = JSON.parse(localStorage.getItem("helphub_user") || "null");
  if (!user) window.location.href = "/auth";

  // ── Avatar helpers ───────────────────────────────────────────
  const COLORS = ["#1a7a6e","#e8a020","#c0392b","#6b2fb0","#1a6b8a","#2db88a","#d4793a"];
  function avatarColor(name) {
    let h = 0; for(let c of (name||"?")) h += c.charCodeAt(0);
    return COLORS[h % COLORS.length];
  }
  function initials(name) {
    return (name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  }
  function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  // ── Badge assign based on trust score ───────────────────────
  function getBadges(trustScore, contributions) {
    const badges = [];
    if (trustScore >= 90) badges.push("Top Mentor");
    if (trustScore >= 80) badges.push("Design Ally");
    if (contributions >= 20) badges.push("Fast Responder");
    if (contributions >= 10) badges.push("Community Voice");
    if (contributions >= 5)  badges.push("Bug Hunter");
    if (badges.length === 0)  badges.push("Rising Helper");
    return badges.slice(0, 3);
  }

  // ── Render rankings ──────────────────────────────────────────
  function renderRankings(users) {
    const list = document.getElementById("rankList");

    if (!users.length) {
      list.innerHTML = `<div class="empty">No users found.</div>`;
      return;
    }

    list.innerHTML = users.map((u, i) => {
      const color  = avatarColor(u.name);
      const skills = Array.isArray(u.skills) && u.skills.length
        ? u.skills.join(", ")
        : (u.profile?.skills || "No skills added");
      const trust  = u.trustScore || 92;
      const contribs = u.contributions || 0;
      const isFirst = i === 0;

      return `
        <div class="rank-item ${isFirst ? "first" : ""}">
          <div class="rank-num">#${i+1}</div>
          <div class="avatar" style="background:${color}">${initials(u.name)}</div>
          <div class="rank-info">
            <div class="rank-name">${esc(u.name)}</div>
            <div class="rank-skills">${esc(skills)}</div>
          </div>
          <div class="rank-stats">
            <div class="rank-trust">${trust}%</div>
            <div class="rank-contribs">${contribs} contributions</div>
          </div>
        </div>`;
    }).join("");
  }

  // ── Render badge system ──────────────────────────────────────
  function renderBadges(users) {
    const list = document.getElementById("badgeList");

    if (!users.length) {
      list.innerHTML = `<div class="empty">Koi data nahi.</div>`;
      return;
    }

    list.innerHTML = users.slice(0, 5).map(u => {
      const trust   = u.trustScore || 92;
      const contribs = u.contributions || 0;
      const badges  = getBadges(trust, contribs);

      return `
        <div class="badge-item">
          <div class="badge-name">${esc(u.name)}</div>
          <div class="badge-tags">${badges.map(b => esc(b)).join(" • ")}</div>
          <div class="trust-bar-wrap">
            <div class="trust-bar" style="width:0%" data-width="${trust}%"></div>
          </div>
        </div>`;
    }).join("");

    // Animate bars after render
    requestAnimationFrame(() => {
      document.querySelectorAll(".trust-bar").forEach(bar => {
        bar.style.width = bar.dataset.width;
      });
    });
  }

  async function fetchLeaderboard() {
    try {
      const usersRes = await fetch(`/api/messages/users?excludeId=none`);
      const allUsers = await usersRes.json();

      const reqRes  = await fetch("/api/requests");
      const requests = await reqRes.json();

      const meRes  = await fetch(`/api/messages/users?excludeId=__none__`);
      const contribMap = {};
      requests.forEach(r => {
        const name = r.author?.name;
        if (name) contribMap[name] = (contribMap[name] || 0) + 1;
      });

      // Build leaderboard data
      let leaders = allUsers.map(u => ({
        ...u,
        trustScore:    u.trustScore    || Math.floor(60 + Math.random() * 38),
        contributions: contribMap[u.name] || u.contributions || 0,
        skills:        Array.isArray(u.skills) ? u.skills : [],
      }));

      // Add current logged-in user if not in list
      const inList = leaders.find(u => String(u._id) === String(user.id));
      if (!inList) {
        leaders.push({
          _id:  user.id,
          name: user.name,
          trustScore:    92,
          contributions: contribMap[user.name] || 0,
          skills:        [],
        });
      }

      // Sort by trust score desc, then contributions
      leaders.sort((a,b) => {
        if (b.trustScore !== a.trustScore) return b.trustScore - a.trustScore;
        return b.contributions - a.contributions;
      });

      renderRankings(leaders);
      renderBadges(leaders);

    } catch(err) {
      console.error("Leaderboard fetch error:", err);
      // Fallback: show current user
      const fallback = [{ _id: user.id, name: user.name, trustScore: 92, contributions: 0, skills: [] }];
      renderRankings(fallback);
      renderBadges(fallback);
    }
  }

  fetchLeaderboard();
  // Refresh every 30s
  setInterval(fetchLeaderboard, 30000);
</script>
</body>
</html>
